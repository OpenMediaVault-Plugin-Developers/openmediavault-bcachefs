version: "1.0"
type: component
data:
  name: omv-storage-filesystem-bcachefs-create-form-page
  type: formPage
  config:
    hints:
      - type: info
        text: _("If a device is not listed here, it is usually because the device already contains a file system or partitions. With the former, the file system can be mounted <a href='#/storage/filesystems/mount'>here</a>. For the latter, please <a href='#/storage/disks'>wipe</a> the device as partitions are not supported.")
        dismissible: true
        stateId: 199e8c7a-ee3b-11ed-9fb1-2750842abc68
    fields:
      - type: textInput
        name: type
        label: _("Type")
        disabled: true
        value: BCACHEFS
        submitValue: false
      - type: divider
        title: _("General")
      - type: textInput
        name: label
        label: _("Label")
        value: ""
        hint: _("Optional label to identify this filesystem.")
      - type: select
        name: devicefiles
        label: _("Devices")
        placeholder: _("Select devices ...")
        hint: _("Select the devices that will be used to create the file system.")
        multiple: true
        valueField: devicefile
        textField: description
        store:
          proxy:
            service: FileSystemMgmt
            get:
              method: getCandidatesBg
              task: true
          sorters:
            - dir: asc
              prop: devicefile
        validators:
          requiredIf:
            operator: falsy
            arg0:
              prop: enablegroups
          custom:
            - constraint:
                operator: or
                arg0:
                  operator: truthy
                  arg0:
                    prop: enablegroups
                arg1:
                  operator: '>='
                  arg0:
                    operator: length
                    arg0:
                      prop: devicefiles
                  arg1:
                    prop: replicas
              errorData: _("The number of devices must be at least equal to the number of replicas.")
        modifiers:
          - type: hidden
            constraint:
              operator: truthy
              arg0:
                prop: enablegroups
      - type: numberInput
        name: replicas
        label: _("Replicas")
        value: 1
        min: 1
        max: 10
        step: 1
        hint: _("Number of copies to store for both data and metadata. Usable space ≈ total raw ÷ replicas — df shows raw capacity")
      - type: checkbox
        name: enablegroups
        label: _("Enable device label groups")
        value: false
        hint: _("Assign devices to named label groups to enable tiering between device types (e.g. SSD and HDD). Hides the Devices field above — use the group selectors instead.")
      - type: textInput
        name: group1name
        label: _("Group 1 Name")
        value: ""
        placeholder: "ssd"
        hint: _("Label group name (e.g. 'ssd'). Devices will be labeled group.group1, group.group2, etc.")
        modifiers:
          - type: hidden
            constraint:
              operator: falsy
              arg0:
                prop: enablegroups
      - type: select
        name: group1devices
        label: _("Group 1 Devices")
        placeholder: _("Select devices ...")
        multiple: true
        valueField: devicefile
        textField: description
        store:
          proxy:
            service: FileSystemMgmt
            get:
              method: getCandidatesBg
              task: true
          sorters:
            - dir: asc
              prop: devicefile
        modifiers:
          - type: hidden
            constraint:
              operator: falsy
              arg0:
                prop: enablegroups
      - type: textInput
        name: group2name
        label: _("Group 2 Name")
        value: ""
        placeholder: "hdd"
        hint: _("Label group name (e.g. 'hdd').")
        modifiers:
          - type: hidden
            constraint:
              operator: falsy
              arg0:
                prop: enablegroups
      - type: select
        name: group2devices
        label: _("Group 2 Devices")
        placeholder: _("Select devices ...")
        multiple: true
        valueField: devicefile
        textField: description
        store:
          proxy:
            service: FileSystemMgmt
            get:
              method: getCandidatesBg
              task: true
          sorters:
            - dir: asc
              prop: devicefile
        modifiers:
          - type: hidden
            constraint:
              operator: falsy
              arg0:
                prop: enablegroups
      - type: textInput
        name: group3name
        label: _("Group 3 Name")
        value: ""
        hint: _("Optional third group. Leave empty if not needed.")
        modifiers:
          - type: hidden
            constraint:
              operator: falsy
              arg0:
                prop: enablegroups
      - type: select
        name: group3devices
        label: _("Group 3 Devices")
        placeholder: _("Select devices ...")
        multiple: true
        valueField: devicefile
        textField: description
        store:
          proxy:
            service: FileSystemMgmt
            get:
              method: getCandidatesBg
              task: true
          sorters:
            - dir: asc
              prop: devicefile
        modifiers:
          - type: hidden
            constraint:
              operator: falsy
              arg0:
                prop: enablegroups
      - type: textInput
        name: foreground_target
        label: _("Foreground Target")
        value: ""
        hint: _("Label group where new data is written first (e.g. 'ssd'). Leave empty to use bcachefs defaults.")
        modifiers:
          - type: hidden
            constraint:
              operator: falsy
              arg0:
                prop: enablegroups
      - type: textInput
        name: promote_target
        label: _("Promote Target")
        value: ""
        hint: _("Label group where frequently-read data is promoted to (e.g. 'ssd'). Leave empty to disable promotion.")
        modifiers:
          - type: hidden
            constraint:
              operator: falsy
              arg0:
                prop: enablegroups
      - type: textInput
        name: background_target
        label: _("Background Target")
        value: ""
        hint: _("Label group where data is moved to in the background (e.g. 'hdd'). Leave empty to use bcachefs defaults.")
        modifiers:
          - type: hidden
            constraint:
              operator: falsy
              arg0:
                prop: enablegroups
      - type: divider
        title: _("Data Integrity")
      - type: select
        name: compression
        label: _("Compression")
        value: "none"
        hint: _("Compression algorithm applied to new data writes. Disabled automatically when NoCOW is enabled.")
        store:
          data:
            - - "none"
              - _("None")
            - - "lz4"
              - "LZ4"
            - - "gzip"
              - "GZIP"
            - - "zstd"
              - "Zstd"
      - type: select
        name: checksum
        label: _("Checksum")
        value: "crc32c"
        hint: _("Checksum algorithm for data and metadata integrity verification. Disabled automatically when NoCOW is enabled.")
        store:
          data:
            - - "crc32c"
              - _("CRC32c (default)")
            - - "crc64"
              - "CRC64"
            - - "xxhash"
              - "xxHash"
            - - "none"
              - _("None")
      - type: divider
        title: _("Advanced")
      - type: checkbox
        name: nocow
        label: _("Disable COW")
        value: false
        hint: _("Write data in-place when possible. Improves performance for databases and VM image storage. Implicitly disables checksums, compression, and encryption.")
      - type: checkbox
        name: encrypted
        label: _("Encryption")
        value: false
        hint: _("Enable whole-filesystem encryption (chacha20/poly1305). Not available when NoCOW is enabled.")
        modifiers:
          - type: hidden
            constraint:
              operator: truthy
              arg0:
                prop: nocow
          - type: unchecked
            opposite: false
            constraint:
              operator: truthy
              arg0:
                prop: nocow
      - type: passwordInput
        name: passphrase
        label: _("Passphrase")
        value: ""
        validators:
          requiredIf:
            operator: truthy
            arg0:
              prop: encrypted
        modifiers:
          - type: hidden
            constraint:
              operator: falsy
              arg0:
                prop: encrypted
      - type: passwordInput
        name: passphrase2
        label: _("Confirm Passphrase")
        value: ""
        submitValue: false
        validators:
          requiredIf:
            operator: truthy
            arg0:
              prop: encrypted
          custom:
            - constraint:
                operator: eq
                arg0:
                  prop: passphrase
                arg1:
                  prop: passphrase2
              errorData: _("The passphrases do not match.")
        modifiers:
          - type: hidden
            constraint:
              operator: falsy
              arg0:
                prop: encrypted
      - type: checkbox
        name: autounlock
        label: _("Auto-unlock at boot")
        value: false
        hint: _("Save the passphrase to a root-only key file so the filesystem unlocks automatically at boot. The key is stored in /etc/bcachefs/keys/.")
        modifiers:
          - type: hidden
            constraint:
              operator: falsy
              arg0:
                prop: encrypted
    buttons:
      - template: submit
        execute:
          type: taskDialog
          taskDialog:
            config:
              title: _("Create file system")
              width: 75%
              startOnInit: true
              request:
                service: Bcachefs
                method: createFilesystem
                params:
                  label: '{{ label }}'
                  replicas: '{{ replicas }}'
                  enablegroups: '{{ enablegroups }}'
                  group1name: '{{ group1name }}'
                  group1devices: '{{ group1devices }}'
                  group2name: '{{ group2name }}'
                  group2devices: '{{ group2devices }}'
                  group3name: '{{ group3name }}'
                  group3devices: '{{ group3devices }}'
                  foreground_target: '{{ foreground_target }}'
                  promote_target: '{{ promote_target }}'
                  background_target: '{{ background_target }}'
                  compression: '{{ compression }}'
                  checksum: '{{ checksum }}'
                  nocow: '{{ nocow }}'
                  encrypted: '{{ encrypted }}'
                  passphrase: '{{ passphrase }}'
                  autounlock: '{{ autounlock }}'
                  devicefiles: '{{ devicefiles }}'
              buttons:
                stop:
                  hidden: true
            successUrl: /storage/filesystems/mount
      - template: cancel
        execute:
          type: url
          url: /storage/filesystems
