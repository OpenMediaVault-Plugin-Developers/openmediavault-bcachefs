version: "1.0"
type: component
data:
  name: omv-storage-bcachefs-filesystems-datatable-page
  type: datatablePage
  config:
    autoReload: false
    hasSearchField: true
    stateId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
    store:
      proxy:
        service: Bcachefs
        get:
          method: getFilesystemList
    columns:
      - name: _("Label")
        prop: label
        flexGrow: 2
        sortable: true
        cellTemplateName: text
        cellTemplateConfig:
          value: "{{ label || uuid }}"
      - name: _("UUID")
        prop: uuid
        flexGrow: 3
        sortable: true
      - name: _("Mountpoint")
        prop: mountpoint
        flexGrow: 3
        sortable: true
      - name: _("Encrypted")
        prop: encrypted
        flexGrow: 1
        sortable: true
        cellTemplateName: checkIcon
      - name: _("Auto-unlock")
        prop: autounlock
        flexGrow: 1
        sortable: true
        cellTemplateName: checkIcon
    actions:
      - type: iconButton
        icon: mdi:lock-open-outline
        tooltip: _("Enable auto-unlock")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
          constraint:
            - operator: falsy
              arg0:
                prop: autounlock
        execute:
          type: url
          url: "/storage/bcachefs/filesystems/autounlock/{{ _selected[0].uuid }}"
      - type: iconButton
        icon: mdi:lock-outline
        tooltip: _("Disable auto-unlock")
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
          constraint:
            - operator: truthy
              arg0:
                prop: autounlock
        execute:
          type: request
          request:
            service: Bcachefs
            method: disableAutoUnlock
            params:
              uuid: "{{ _selected[0].uuid }}"
            confirmDialog:
              template: confirmation
              message: _("Do you really want to disable auto-unlock? The key file will be deleted and the filesystem will require a passphrase at next boot.")
